<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
   <title>UrbanCart | Premium Store</title>
   <!-- Font Awesome 6 (stable & modern) -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
   <!-- Google Fonts: Poppins + Inter fallback -->
   <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet">
   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         background: linear-gradient(145deg, #f4f7fc 0%, #e9eef5 100%);
         font-family: 'Inter', 'Poppins', sans-serif;
         color: #1a1e2b;
         scroll-behavior: smooth;
      }

      /* custom scrollbar */
      ::-webkit-scrollbar {
         width: 8px;
      }

      ::-webkit-scrollbar-track {
         background: #e2e8f0;
         border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb {
         background: #0d6efd;
         border-radius: 10px;
      }

      /* modern navbar */
      .nav {
         width: 100%;
         min-height: 80px;
         background: rgba(255, 255, 255, 0.96);
         backdrop-filter: blur(12px);
         display: flex;
         align-items: center;
         justify-content: space-between;
         padding: 0 5%;
         box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
         position: sticky;
         top: 0;
         z-index: 1000;
         transition: all 0.2s ease;
         border-bottom: 1px solid rgba(13, 110, 253, 0.1);
      }

      .logo {
         display: flex;
         align-items: center;
         gap: 14px;
      }

      .logo img {
         width: 52px;
         height: 52px;
         border-radius: 50%;
         object-fit: cover;
         border: 2.5px solid #0d6efd;
         box-shadow: 0 6px 12px rgba(13, 110, 253, 0.2);
         transition: transform 0.2s ease;
      }

      .logo img:hover {
         transform: scale(1.02);
      }

      .logo span {
         font-size: 1.6rem;
         font-weight: 800;
         background: linear-gradient(135deg, #0d6efd, #0099ff);
         -webkit-background-clip: text;
         background-clip: text;
         color: transparent;
         letter-spacing: -0.5px;
      }

      .logo i {
         display: none;
         font-size: 28px;
         cursor: pointer;
         color: #0d6efd;
         transition: 0.2s;
      }

      .list {
         display: flex;
         gap: 12px;
         list-style: none;
         align-items: center;
      }

      .list li a {
         text-decoration: none;
         color: #1f2937;
         font-size: 1rem;
         font-weight: 600;
         padding: 8px 20px;
         border-radius: 40px;
         transition: all 0.25s ease;
         letter-spacing: -0.2px;
         display: inline-flex;
         align-items: center;
         gap: 8px;
      }

      .list li a i {
         font-size: 1rem;
      }

      .list li a:hover {
         background: #0d6efd;
         color: white;
         box-shadow: 0 8px 18px rgba(13, 110, 253, 0.35);
         transform: translateY(-2px);
      }

      /* active / special register style */
      .list li:last-child a {
         background: rgba(13, 110, 253, 0.12);
         border: 1px solid rgba(13, 110, 253, 0.3);
      }

      .list li:last-child a:hover {
         background: #0d6efd;
         border-color: transparent;
      }

      /* product grid - improved layout */
      .hero {
         max-width: 1400px;
         margin: 40px auto;
         padding: 0 30px 50px;
         display: grid;
         grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
         gap: 32px;
      }

      /* product card premium */
      .product-card {
         background: #ffffff;
         border-radius: 28px;
         overflow: hidden;
         box-shadow: 0 18px 36px -12px rgba(0, 0, 0, 0.08);
         transition: all 0.35s cubic-bezier(0.2, 0, 0, 1);
         position: relative;
         display: flex;
         flex-direction: column;
         border: 1px solid rgba(255, 255, 255, 0.5);
         backdrop-filter: blur(2px);
      }

      .product-card::before {
         content: "";
         position: absolute;
         top: 0;
         left: 0;
         width: 100%;
         height: 5px;
         background: linear-gradient(90deg, #0d6efd, #5ca9ff, #b0d4ff);
         z-index: 1;
      }

      .product-card:hover {
         transform: translateY(-12px) scale(1.01);
         box-shadow: 0 30px 45px -18px rgba(0, 0, 0, 0.25);
         border-color: rgba(13, 110, 253, 0.3);
      }

      .card-img {
         width: 100%;
         height: 250px;
         object-fit: cover;
         transition: transform 0.45s ease;
         display: block;
         background: #f8fafc;
      }

      .product-card:hover .card-img {
         transform: scale(1.05);
      }

      .card-badge {
         position: absolute;
         top: 18px;
         left: 18px;
         background: rgba(13, 110, 253, 0.9);
         backdrop-filter: blur(4px);
         color: white;
         font-size: 0.7rem;
         font-weight: 700;
         padding: 5px 12px;
         border-radius: 40px;
         letter-spacing: 0.5px;
         z-index: 3;
         box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .card-content {
         padding: 20px 22px 24px;
         display: flex;
         flex-direction: column;
         gap: 10px;
      }

      .product-title {
         font-size: 1.4rem;
         font-weight: 700;
         color: #0a1929;
         line-height: 1.3;
         letter-spacing: -0.3px;
      }

      .rating {
         display: flex;
         align-items: center;
         gap: 6px;
         margin: 4px 0;
      }

      .stars {
         color: #ffb800;
         font-size: 0.85rem;
         letter-spacing: 2px;
      }

      .review-count {
         font-size: 0.75rem;
         color: #5b6e8c;
         font-weight: 500;
      }

      .price-wrapper {
         display: flex;
         align-items: baseline;
         gap: 12px;
         flex-wrap: wrap;
         margin: 5px 0;
      }

      .current-price {
         font-size: 1.8rem;
         font-weight: 800;
         color: #0d6efd;
      }

      .current-price::before {
         content: "₹ ";
         font-size: 1.2rem;
         font-weight: 600;
      }

      .old-price {
         font-size: 0.9rem;
         color: #8a99b4;
         text-decoration: line-through;
      }

      .product-desc {
         color: #4a5a72;
         font-size: 0.85rem;
         line-height: 1.45;
         margin: 6px 0;
         display: -webkit-box;
         -webkit-line-clamp: 2;
         -webkit-box-orient: vertical;
         overflow: hidden;
      }

      .card-actions {
         display: flex;
         gap: 12px;
         margin-top: 12px;
      }

      .btn-cart {
         flex: 1;
         background: #0d6efd;
         border: none;
         color: white;
         font-weight: 700;
         padding: 12px 0;
         border-radius: 60px;
         font-size: 0.9rem;
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 10px;
         cursor: pointer;
         transition: all 0.2s ease;
         font-family: inherit;
         box-shadow: 0 4px 8px rgba(13, 110, 253, 0.2);
      }

      .btn-cart i {
         font-size: 1rem;
         transition: transform 0.15s;
      }

      .btn-cart:hover {
         background: #0b5ed7;
         transform: scale(0.98);
         box-shadow: 0 2px 6px rgba(13, 110, 253, 0.3);
      }

      .btn-cart:hover i {
         transform: translateX(3px);
      }

      .btn-wishlist {
         background: #f1f5f9;
         border: 1px solid #e2e8f0;
         border-radius: 60px;
         width: 46px;
         color: #5b6e8c;
         cursor: pointer;
         transition: 0.2s;
         font-size: 1.1rem;
      }

      .btn-wishlist:hover {
         background: #fee2e2;
         color: #ef4444;
         border-color: #fecaca;
      }

      /* footer section */
      .footer {
         background: #0f172a;
         color: #cbd5e1;
         padding: 35px 30px 25px;
         margin-top: 60px;
         text-align: center;
         border-top-left-radius: 32px;
         border-top-right-radius: 32px;
      }

      .footer-content {
         max-width: 1200px;
         margin: 0 auto;
         display: flex;
         flex-direction: column;
         gap: 18px;
      }

      .social-icons {
         display: flex;
         justify-content: center;
         gap: 22px;
         font-size: 1.5rem;
      }

      .social-icons a {
         color: #94a3b8;
         transition: 0.2s;
      }

      .social-icons a:hover {
         color: #0d6efd;
         transform: translateY(-3px);
      }

      .footer p {
         font-size: 0.85rem;
         letter-spacing: 0.3px;
      }

      /* mobile responsiveness */
      @media(max-width: 768px) {
         .nav {
            flex-direction: column;
            align-items: stretch;
            padding: 12px 20px;
         }

         .logo {
            width: 100%;
            justify-content: space-between;
         }

         .logo i {
            display: block;
            font-size: 28px;
         }

         .logo span {
            font-size: 1.4rem;
         }

         .list {
            display: none;
            flex-direction: column;
            width: 100%;
            margin-top: 18px;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 16px 8px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
         }

         .list.show {
            display: flex;
         }

         .list li a {
            text-align: center;
            background: #f8fafc;
            border-radius: 60px;
            justify-content: center;
         }

         .hero {
            padding: 20px 16px 40px;
            gap: 24px;
         }

         .card-img {
            height: 210px;
         }

         .current-price {
            font-size: 1.5rem;
         }
      }

      /* toast notification */
      .toast-msg {
         position: fixed;
         bottom: 30px;
         left: 50%;
         transform: translateX(-50%) translateY(100px);
         background: #1e293b;
         color: white;
         padding: 12px 28px;
         border-radius: 60px;
         font-weight: 500;
         z-index: 1200;
         transition: transform 0.25s ease;
         box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
         backdrop-filter: blur(8px);
         background: rgba(15, 23, 42, 0.95);
         font-size: 0.9rem;
         pointer-events: none;
      }

      .toast-msg.show {
         transform: translateX(-50%) translateY(0);
      }

      .toast-msg i {
         margin-right: 8px;
         color: #4ade80;
      }
   </style>
</head>

<body>

   <div class="nav">
      <div class="logo">
         <img
            src="https://img.freepik.com/free-vector/shopping-web-icon-design-element_460848-8737.jpg?semt=ais_hybrid&w=740&q=80"
            alt="UrbanCart logo">
         <span>URBANCART</span>
         <i class="fa-solid fa-bars" id="menuIcon"></i>
      </div>
      <ol class="list" id="navList">
         <li><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>
         <li><a href="#"><i class="fa-regular fa-compass"></i> Explore</a></li>
         <li><a href="#"><i class="fa-regular fa-heart"></i> Wishlist</a></li>
         <li><a href="#"><i class="fa-regular fa-user"></i> Login</a></li>
         <li><a href="#"><i class="fa-solid fa-user-plus"></i> Register</a></li>
      </ol>
   </div>

   <div class="hero" id="productGrid"></div>

   <footer class="footer">
      <div class="footer-content">
         <div class="social-icons">
            <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
            <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" aria-label="Github"><i class="fab fa-github"></i></a>
         </div>
         <p>© 2025 UrbanCart — premium essentials. All styles reserved.</p>
         <p style="font-size: 0.75rem;">✨ Free shipping on orders above ₹999 ✨</p>
      </div>
   </footer>

   <div class="toast-msg" id="toastMsg"><i class="fa-solid fa-circle-check"></i> added to cart</div>

   <script>
      // ---------- PRODUCT DATABASE (improved variety) ----------
      const products = [
         {
            id: 1,
            name: "Apex Drift Sneakers",
            price: 3499,
            oldPrice: 4999,
            desc: "Breathable knit + memory foam insole. Perfect for all-day comfort & street style.",
            image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400&h=300&fit=crop&auto=format",
            rating: 4.7,
            reviews: 213,
            badge: "Bestseller"
         },
         {
            id: 2,
            name: "Orion SmartWatch Ultra",
            price: 5999,
            oldPrice: 8999,
            desc: "1.78” AMOLED, heart rate + SPO2, 10-day battery life. Fitness redefined.",
            image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=300&fit=crop&auto=format",
            rating: 4.9,
            reviews: 847,
            badge: "Trending"
         },
         {
            id: 3,
            name: "NovaBuds Pro",
            price: 2499,
            oldPrice: 3999,
            desc: "Hybrid ANC, 30H playtime, spatial audio & low-latency gaming mode.",
            image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=300&fit=crop&auto=format",
            rating: 4.8,
            reviews: 562,
            badge: "Wireless"
         },
         {
            id: 4,
            name: "Apex Utility Backpack",
            price: 1899,
            oldPrice: 2799,
            desc: "Water-resistant, 20L capacity, padded laptop compartment + USB charging port.",
            image: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=300&fit=crop&auto=format",
            rating: 4.5,
            reviews: 314,
            badge: "Eco"
         },
         {
            id: 5,
            name: "Vector Aviator Shades",
            price: 1599,
            oldPrice: 2999,
            desc: "UV400 polarized lenses, titanium frame – classic style meets protection.",
            image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=300&fit=crop&auto=format",
            rating: 4.6,
            reviews: 198,
            badge: "Summer"
         },
         {
            id: 6,
            name: "Strider X Running Shoes",
            price: 3999,
            oldPrice: 5999,
            desc: "Energy-return foam, anti-slip grip, breathable mesh upper for runners.",
            image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&h=300&fit=crop&auto=format",
            rating: 4.8,
            reviews: 451,
            badge: "Performance"
         },
         {
            id: 7,
            name: "ThermoHeat Smart Mug",
            price: 1299,
            oldPrice: 2299,
            desc: "Smart temperature control, keeps coffee 55°C for 2h. App connectivity.",
            image: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=400&h=300&fit=crop&auto=format",
            rating: 4.4,
            reviews: 129,
            badge: "Gadget"
         },
         {
            id: 8,
            name: "ErgoMesh Office Chair",
            price: 8999,
            oldPrice: 14999,
            desc: "Adjustable lumbar, 3D armrests, breathable mesh & recline lock.",
            image: "https://images.unsplash.com/photo-1580480055273-228ff5388ef8?w=400&h=300&fit=crop&auto=format",
            rating: 4.9,
            reviews: 312,
            badge: "Premium"
         }
      ];

      // Helper: render star rating
      function renderStars(rating) {
         const fullStars = Math.floor(rating);
         const halfStar = (rating % 1) >= 0.5;
         let starsHtml = '';
         for (let i = 0; i < fullStars; i++) starsHtml += '<i class="fa-solid fa-star"></i>';
         if (halfStar) starsHtml += '<i class="fa-solid fa-star-half-alt"></i>';
         const emptyStars = 5 - Math.ceil(rating);
         for (let i = 0; i < emptyStars; i++) starsHtml += '<i class="fa-regular fa-star"></i>';
         return starsHtml;
      }

      // display product grid
      function displayProducts() {
         const gridContainer = document.getElementById('productGrid');
         if (!gridContainer) return;

         let html = '';
         products.forEach(product => {
            const starHtml = renderStars(product.rating);
            html += `
          <div class="product-card" onclick="openDetail(${product.id})">
               <div class="card-badge">${product.badge}</div>
               <img class="card-img" src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://placehold.co/400x300/eef2ff/0d6efd?text=UrbanCart'">
               <div class="card-content">
                  <h3 class="product-title">${product.name}</h3>
                  <div class="rating">
                     <div class="stars">${starHtml}</div>
                     <span class="review-count">(${product.reviews} reviews)</span>
                  </div>
                  <div class="price-wrapper">
                     <span class="current-price">${product.price}</span>
                     ${product.oldPrice ? `<span class="old-price">₹${product.oldPrice}</span>` : ''}
                  </div>
                  <p class="product-desc">${product.desc}</p>
                  <div class="card-actions">
                     <button class="btn-cart" data-id="${product.id}" data-name="${product.name}">
                        <i class="fa-solid fa-bag-shopping"></i> Add to Cart
                     </button>
                     <button class="btn-wishlist" data-id="${product.id}">
                        <i class="fa-regular fa-heart"></i>
                     </button>
                  </div>
               </div>
            </div>
         `;
         });
         gridContainer.innerHTML = html;
      }
      function openDetail(id) {
         let selectedProduct = products.find(item => item.id == id);

         localStorage.setItem("productDetail", JSON.stringify(selectedProduct));

         window.location.href = "exe23_detail.html";
      }
      // Toast manager
      let toastTimeout;
      function showToast(message, isError = false) {
         const toast = document.getElementById('toastMsg');
         if (toastTimeout) clearTimeout(toastTimeout);
         toast.innerHTML = `<i class="fa-solid ${isError ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i> ${message}`;
         toast.classList.add('show');
         toastTimeout = setTimeout(() => {
            toast.classList.remove('show');
         }, 2200);
      }

      // Event delegation for cart & wishlist buttons
      function attachProductEvents() {
         const grid = document.getElementById('productGrid');
         if (!grid) return;
         grid.addEventListener('click', (e) => {
            const cartBtn = e.target.closest('.btn-cart');
            const wishBtn = e.target.closest('.btn-wishlist');

            if (cartBtn) {
               const productName = cartBtn.getAttribute('data-name') || 'item';
               showToast(`${productName} added ✨`);
               // optional micro animation
               const icon = cartBtn.querySelector('i');
               if (icon) {
                  icon.style.transform = 'scale(1.2)';
                  setTimeout(() => { if (icon) icon.style.transform = ''; }, 150);
               }
               e.preventDefault();
            }
            if (wishBtn) {
               const heartIcon = wishBtn.querySelector('i');
               if (heartIcon) {
                  if (heartIcon.classList.contains('fa-regular')) {
                     heartIcon.classList.remove('fa-regular');
                     heartIcon.classList.add('fa-solid', 'fa-heart');
                     heartIcon.style.color = '#ef4444';
                     showToast('❤️ Saved to wishlist!');
                  } else {
                     heartIcon.classList.remove('fa-solid', 'fa-heart');
                     heartIcon.classList.add('fa-regular');
                     heartIcon.style.color = '';
                     showToast('Removed from wishlist');
                  }
               } else {
                  showToast('wishlist updated', false);
               }
            }
         });
      }

      // ----- MOBILE MENU ( improved toggle + resize handling ) -----
      function initMobileMenu() {
         const menuIcon = document.getElementById('menuIcon');
         const navList = document.getElementById('navList');
         if (!menuIcon || !navList) return;

         const toggleMenu = () => {
            navList.classList.toggle('show');
            // change icon style
            if (navList.classList.contains('show')) {
               menuIcon.classList.remove('fa-bars');
               menuIcon.classList.add('fa-times');
            } else {
               menuIcon.classList.remove('fa-times');
               menuIcon.classList.add('fa-bars');
            }
         };

         menuIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
         });

         // close menu when a link is clicked (mobile)
         const links = navList.querySelectorAll('a');
         links.forEach(link => {
            link.addEventListener('click', () => {
               if (window.innerWidth <= 768) {
                  navList.classList.remove('show');
                  menuIcon.classList.remove('fa-times');
                  menuIcon.classList.add('fa-bars');
               }
            });
         });

         // handle resize: if screen > 768, ensure menu is not forced hidden
         window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
               if (navList.classList.contains('show')) {
                  navList.classList.remove('show');
                  if (menuIcon.classList.contains('fa-times')) {
                     menuIcon.classList.remove('fa-times');
                     menuIcon.classList.add('fa-bars');
                  }
               }
               // also ensure display style gets removed (CSS handles flex)
               navList.style.display = '';
            } else {
               // on mobile, no forced inline style; class controls show/hide
               if (!navList.classList.contains('show')) {
                  // nothing else
               }
            }
         });
      }

      // additional micro: scroll reveal effect & card entrance (subtle)
      function addScrollFade() {
         const cards = document.querySelectorAll('.product-card');
         if (!cards.length) return;
         const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
               if (entry.isIntersecting) {
                  entry.target.style.opacity = '1';
                  entry.target.style.transform = 'translateY(0)';
                  observer.unobserve(entry.target);
               }
            });
         }, { threshold: 0.05 });
         cards.forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(18px)';
            card.style.transition = 'opacity 0.4s ease, transform 0.35s ease';
            observer.observe(card);
         });
      }

      // smooth dummy for login/register links (prevent default)
      function preventEmptyLinks() {
         const allLinks = document.querySelectorAll('.list a');
         allLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === '#' || href === '' || href === 'exe21.html') {
               link.addEventListener('click', (e) => {
                  e.preventDefault();
                  showToast('✨ Demo: Authentication portal coming soon!', false);
               });
            }
         });
      }

      // initialize full application
      function initApp() {
         displayProducts();
         attachProductEvents();
         initMobileMenu();
         preventEmptyLinks();
         // slight delay to observe cards after render
         setTimeout(() => {
            addScrollFade();
         }, 100);
      }

      // run after DOM ready
      if (document.readyState === 'loading') {
         document.addEventListener('DOMContentLoaded', initApp);
